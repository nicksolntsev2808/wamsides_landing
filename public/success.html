<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />

    <meta name="robots" content="noindex" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        background-color: #FDF6EE;
        font-family: 'Nunito', sans-serif;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2rem 1.25rem;
      }

      .card {
        background: #FFFAF5;
        border-radius: 1.5rem;
        box-shadow: 0 16px 48px rgba(74, 46, 26, 0.10);
        padding: 3rem 2.5rem;
        max-width: 480px;
        width: 100%;
        text-align: center;
      }

      .icon-wrap {
        width: 5.5rem;
        height: 5.5rem;
        border-radius: 50%;
        background: linear-gradient(135deg, #C9603A, #E8895A);
        box-shadow: 0 8px 28px rgba(201, 96, 58, 0.32);
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 2rem;
      }

      h1 {
        font-family: 'Raleway', sans-serif;
        font-weight: 800;
        font-size: 2rem;
        color: #4A2E1A;
        margin-bottom: 0.75rem;
        line-height: 1.2;
      }

      .subtitle {
        font-size: 1.05rem;
        color: #5C3D2E;
        line-height: 1.7;
        margin-bottom: 2rem;
      }

      .info-box {
        background: #FFF3ED;
        border-radius: 1rem;
        padding: 1.1rem 1.5rem;
        margin-bottom: 2rem;
      }

      .info-box p {
        font-size: 0.9rem;
        color: #9E7A65;
        margin-bottom: 0.35rem;
      }

      .info-box a {
        font-weight: 700;
        font-size: 1rem;
        color: #C9603A;
        text-decoration: none;
      }

      .info-box a:hover { text-decoration: underline; }

      .btn-home {
        display: inline-block;
        background: linear-gradient(135deg, #C9603A, #E8895A);
        color: #FFFAF5;
        font-family: 'Nunito', sans-serif;
        font-weight: 700;
        font-size: 1rem;
        padding: 0.875rem 2.25rem;
        border-radius: 3rem;
        text-decoration: none;
        transition: opacity 0.2s;
        margin-bottom: 1.25rem;
      }

      .btn-home:hover { opacity: 0.88; }

      .back-link {
        display: block;
        font-size: 0.85rem;
        color: #9E7A65;
        text-decoration: underline;
        cursor: pointer;
      }

      .logo {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        margin-bottom: 2.5rem;
        text-decoration: none;
      }

      .logo-icon {
        width: 2.25rem;
        height: 2.25rem;
        border-radius: 0.5rem;
        background: linear-gradient(135deg, #C9603A, #E8895A);
        display: flex;
        align-items: center;
        justify-content: center;
        color: #FFFAF5;
        font-family: 'Raleway', sans-serif;
        font-weight: 900;
        font-size: 1.1rem;
      }

      .logo-text {
        font-family: 'Raleway', sans-serif;
        font-weight: 800;
        font-size: 1.2rem;
        color: #4A2E1A;
      }
    </style>
  </head>
  <body>

    <div class="card">

      <a href="https://warmsides.com/" class="logo">

      <div class="icon-wrap">
        <svg width="34" height="34" fill="none" viewBox="0 0 24 24" stroke="#FFFAF5" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
        </svg>

        Ми отримали ваше звернення і вже передали його менеджеру.<br />
        Вікторія зв'яжеться з вами протягом <strong>1–2 годин</strong> у робочий час.
      </p>

      <div class="info-box">
        <p>Якщо маєте термінове питання — напишіть одразу:</p>
        <a href="https://t.me/NS940828" target="_blank" rel="noopener noreferrer">Telegram @NS940828</a>
      </div>

      <a href="https://promo.warmsides.com/" class="btn-home">Повернутися на сайт</a>
      <a href="https://warmsides.com/" class="back-link">Перейти на warmsides.com</a>

</html>
