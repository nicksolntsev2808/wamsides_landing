<!doctype html>
<html lang="uk">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Warmsides — Лендинги, які приводять заявки</title>
		<meta name="description" content="За 4 тижні запустимо лендинг, який приводить заявки, а не зливає трафік. UX-орієнтована студія Warmsides." />
	</head>
	<body>
		<div id="root"></div>

		<!-- Hidden Netlify form detector — required for Netlify Forms to work with SPA -->
		<form name="contact" data-netlify="true" netlify-honeypot="bot-field" hidden>
			<input type="text" name="name" />
			<input type="text" name="phone" />
			<input type="hidden" name="bot-field" />
		</form>

		<script type="module" src="/src/web/main.tsx"></script>
	</body>
</html>
